<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>My Organizer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#060C18;color:#e8e8e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;}
input,button,select,textarea{font-family:inherit;}
input{background:#0C1525;border:1px solid #1C2E4A;border-radius:8px;padding:10px 12px;color:#e8e8e8;font-size:14px;outline:none;width:100%;}
input:focus{border-color:#C9A227;}
input[type=range]{background:none;border:none;padding:0;accent-color:#C9A227;}
input[type=time]{width:90px;}
input[type=color]{width:36px;height:36px;padding:2px;border-radius:8px;cursor:pointer;flex-shrink:0;border:1px solid #1C2E4A;background:#0C1525;}
.evt-edit-form{display:flex;flex-direction:column;gap:6px;padding:8px 0;border-bottom:1px solid #0C1525;}
.cat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #0C1525;}
.cat-swatch{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.icon-btn{background:transparent;color:#888;font-size:13px;padding:3px 6px;border:none;cursor:pointer;border-radius:6px;}
.icon-btn:hover{color:#e8e8e8;}
.inv-label{font-size:11px;color:#888;margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase;}
input[type=number]{-moz-appearance:textfield;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select{background:#0C1525;border:1px solid #1C2E4A;border-radius:8px;padding:10px 12px;color:#e8e8e8;font-size:14px;outline:none;width:100%;}
textarea{background:#0C1525;border:1px solid #1C2E4A;border-radius:8px;padding:10px 12px;color:#e8e8e8;font-size:14px;outline:none;width:100%;resize:vertical;line-height:1.5;}
textarea:focus{border-color:#C9A227;}
button{cursor:pointer;border:none;border-radius:8px;font-size:14px;font-weight:500;}
#header{background:#0C1525;border-bottom:1px solid #1C2E4A;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
#header h1{font-size:16px;font-weight:500;}
.status-ok{color:#3d9e75;}.status-err{color:#d85a30;}.status-mid{color:#888;}
.hbtn{font-size:12px;color:#888;background:transparent;border:1px solid #1C2E4A;border-radius:6px;padding:4px 8px;}
.bar{background:#0F1E35;border-bottom:1px solid #1C2E4A;padding:10px 16px;display:none;gap:8px;align-items:center;}
.bar.open{display:flex;}
.bar input{flex:1;width:auto;}
#nav{display:flex;gap:4px;padding:10px 12px;background:#0C1525;border-bottom:1px solid #1C2E4A;overflow-x:auto;}
#nav::-webkit-scrollbar{display:none;}
.nav-btn{padding:6px 12px;border-radius:20px;background:transparent;color:#888;font-size:13px;white-space:nowrap;border:none;}
.nav-btn.active{background:#C9A227;color:#fff;}
#main{flex:1;padding:16px;overflow-y:auto;max-width:480px;width:100%;margin:0 auto;}
.add-row{display:flex;gap:8px;margin-bottom:16px;}
.pbtn{background:#C9A227;color:#fff;padding:10px 16px;white-space:nowrap;border-radius:8px;border:none;font-size:14px;font-weight:500;cursor:pointer;}
.sbtn{background:#C9A227;color:#fff;padding:6px 12px;white-space:nowrap;font-size:13px;border-radius:8px;border:none;font-weight:500;cursor:pointer;}
.card{background:#0F1E35;border:1px solid #1C2E4A;border-radius:12px;padding:14px;margin-bottom:10px;}
.del-btn{background:transparent;color:#888;font-size:14px;padding:4px;border:none;cursor:pointer;}
.empty{color:#888;font-size:14px;text-align:center;margin-top:2rem;}
.cal-nav-btn{background:#0C1525;color:#888;border:1px solid #1C2E4A;border-radius:8px;padding:5px 12px;font-size:16px;cursor:pointer;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
.cal-day{border-radius:8px;padding:4px 3px;cursor:pointer;min-height:68px;border:1px solid transparent;display:flex;flex-direction:column;align-items:stretch;overflow:hidden;}
.cal-day span{font-size:12px;font-weight:500;text-align:center;display:block;margin-bottom:3px;}
.cal-day.today{border-color:#C9A227;}.cal-day.today>span{color:#C9A227;}
.cal-day.selected{background:#C9A227;}.cal-day.selected>span{color:#fff;}
.cal-evt-chip{font-size:9px;color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:1.5;font-weight:500;}
.cal-evt-more{font-size:9px;color:#888;padding-left:2px;}
.fin-tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;}
.fin-tab{padding:6px 13px;border-radius:20px;border:none;font-size:12px;cursor:pointer;white-space:nowrap;background:#0F1E35;color:#888;}
.fin-tab.active{background:#C9A227;color:#fff;font-weight:500;}
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.sc{background:#0F1E35;border:1px solid #1C2E4A;border-radius:12px;padding:12px;text-align:center;}
.sl{font-size:11px;color:#888;margin-bottom:4px;}
.sv{font-size:15px;font-weight:500;}
#chat-wrap{background:#0C1525;border-top:1px solid #1C2E4A;padding:8px 16px;}
#chat-inner{max-width:480px;margin:0 auto;}
#chat-toggle{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:2px 0;}
#chat-body{display:none;margin-top:8px;}
#chat-body.open{display:block;}
#chat-messages{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;margin-bottom:8px;gap:6px;}
.bubble{padding:9px 13px;border-radius:12px;font-size:14px;line-height:1.5;max-width:85%;}
.bubble.ai{background:#0F1E35;border-radius:12px 12px 12px 4px;align-self:flex-start;}
.bubble.user{background:#2A1A00;border-radius:12px 12px 4px 12px;align-self:flex-end;}
.bubble.thinking{color:#888;}
#chat-input-row{display:flex;gap:8px;}
#chat-input{flex:1;font-size:13px;}
#send-btn{background:#C9A227;color:#fff;padding:10px 14px;font-size:16px;border:none;border-radius:8px;}
#send-btn:disabled{background:#1C2E4A;opacity:0.6;}
#lock-screen{position:fixed;inset:0;background:#060C18;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;}
#lock-screen.hidden{display:none;}
#lock-card{width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px;align-items:center;}
#lock-icon{font-size:40px;margin-bottom:4px;}
#lock-title{font-size:20px;font-weight:600;color:#e8e8e8;}
#lock-sub{font-size:13px;color:#888;margin-bottom:4px;}
#lock-card input{width:100%;}
#lock-btn{width:100%;background:#C9A227;color:#fff;padding:12px;font-size:15px;font-weight:600;border-radius:10px;border:none;cursor:pointer;margin-top:4px;}
#lock-btn:disabled{background:#1C2E4A;opacity:0.6;cursor:default;}
#lock-err{font-size:12px;color:#d85a30;min-height:16px;}

</style>
</head>
<body>

<div id="lock-screen">
  <div id="lock-card">
    <div id="lock-icon">🔒</div>
    <h2 id="lock-title">My Organizer</h2>
    <p id="lock-sub">Enter your credentials to continue</p>
    <input id="lock-url" type="url" placeholder="Cloud Run URL (https://…)"/>
    <input id="lock-token" type="password" placeholder="Bearer token"/>
    <button id="lock-btn" onclick="unlockApp()">Unlock</button>
    <p id="lock-err"></p>
  </div>
</div>

<div id="header">
  <h1>My Organizer</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="sync-status" class="status-err" style="font-size:11px;">Not connected</span>
    <button class="hbtn" onclick="toggleBar('url-bar')">⚙ URL</button>
    <button class="hbtn" onclick="toggleBar('token-bar')">🔒 Token</button>
    <button class="hbtn" onclick="toggleBar('key-bar')">🔑 Key</button>
  </div>
</div>
<div id="url-bar" class="bar">
  <input id="url-field" type="url" placeholder="https://your-function.run.app"/>
  <button class="sbtn" onclick="connectWorker()">Connect</button>
</div>
<div id="token-bar" class="bar">
  <input id="token-field" type="password" placeholder="Bearer token for Cloud Run"/>
  <button class="sbtn" onclick="saveToken()">Save</button>
</div>
<div id="key-bar" class="bar">
  <input id="key-field" type="password" placeholder="Gemini API key (AIza...)"/>
  <button class="sbtn" onclick="saveKey()">Save</button>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="nav('calendar',this)">▦ Calendar</button>
  <button class="nav-btn" onclick="nav('goals',this)">◎ Goals</button>
  <button class="nav-btn" onclick="nav('shopping',this)">⊕ Shopping</button>
  <button class="nav-btn" onclick="nav('finance',this)">€ Finance</button>
  <button class="nav-btn" onclick="nav('investment',this)">📈 Invest</button>
  <button class="nav-btn" onclick="nav('workspace',this)">✏ Notes</button>
</div>

<div id="main"></div>

<div id="chat-wrap">
  <div id="chat-inner">
    <div id="chat-toggle" onclick="toggleChat()">
      <span style="font-size:12px;color:#888">AI Assistant</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <button id="chat-clear-btn" onclick="event.stopPropagation();clearChat()" style="font-size:11px;color:#888;background:transparent;border:1px solid #1C2E4A;border-radius:6px;padding:3px 8px;cursor:pointer">Clear</button>
        <span id="chat-chevron" style="font-size:12px;color:#888;">▲</span>
      </div>
    </div>
    <div id="chat-body">
      <div id="chat-messages">
        <div class="bubble ai">Hi Alejandro! Use ⚙ URL to sync with Google Cloud, and 🔑 Key for Gemini AI.</div>
      </div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder='Ask AI — "What should I focus on today?"' onkeydown="if(event.key==='Enter')sendMsg()"/>
        <button id="send-btn" onclick="sendMsg()">↑</button>
      </div>
    </div>
  </div>
</div>

<script>
// ═══ CORE ═══
// ── Constants ──
const WKEY="organizer_worker_url", GKEY="gemini_api_key", TKEY="organizer_token";
const MONTHS_S=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const MONTHS_L=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const ECATS=["Housing","Food","Transport","Health","Entertainment","Shopping","Utilities","Other"];
const DEFAULT_EVT_CATS=[
  {name:"Work",    color:"#4A90D9"},
  {name:"Personal",color:"#3d9e75"},
  {name:"Health",  color:"#E05C5C"},
  {name:"Social",  color:"#9B6DD4"},
  {name:"Travel",  color:"#E08A3C"},
  {name:"Other",   color:"#888888"},
];
function evtColor(cat){
  const cats=D.eventCategories||DEFAULT_EVT_CATS;
  return (cats.find(c=>c.name===cat)||{color:"#888888"}).color;
}
const fmt=n=>"€"+Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

const now=new Date();
const todayStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

// ── State ──
let workerUrl=localStorage.getItem(WKEY)||"";
let workerToken=localStorage.getItem(TKEY)||"";
let section="calendar";
let calSel=null, calView={y:now.getFullYear(),m:now.getMonth()}, calMode="month";
let calWeekStart=new Date(now); calWeekStart.setDate(now.getDate()-now.getDay());
let calDayDate=new Date(now);
let finTab="overview", finM=now.getMonth(), finY=now.getFullYear();
let wsTab="tasks";
let aiLoading=false, chatHist=[];
let showAddEvt=false, showCatMgr=false, editCatName=null, editEvtIdx=null, delConfirmEvt=null;
let editShopCard=null, editShopItemKey=null, activeShopCard=0;
let activeGoal=0;
let editExpIdx=null;

// ── Data ──
let D={
  tasks:[{id:1,text:"Review patent pipeline config",done:false}],
  notes:[{id:1,text:"El Toro: check BONit invoice export",done:false}],
  goals:[{id:1,text:"Ship confidentiality system v2",progress:60}],
  shopping:[],
  events:[],
  finance:{incomeSources:[],expenseCategories:["Housing","Food","Transport","Health","Entertainment","Utilities","Other"],expenses:[],salary:0,transactions:[],budgets:{}},
  review:[],
  eventCategories:[...DEFAULT_EVT_CATS],
  investments:[]
};

function safeD(){
  if(!D.finance)D.finance={};
  if(!D.finance.incomeSources)D.finance.incomeSources=[];
  if(!D.finance.expenseCategories)D.finance.expenseCategories=["Housing","Food","Transport","Health","Entertainment","Utilities","Other"];
  if(!D.finance.expenses)D.finance.expenses=[];
  if(!D.finance.transactions)D.finance.transactions=[];
  if(!D.finance.budgets)D.finance.budgets={};
  if(!D.review)D.review=[];
  if(!D.events)D.events=[];
  if(!D.tasks)D.tasks=[];
  if(!D.notes)D.notes=[];
  if(!D.goals)D.goals=[];
  if(!D.shopping)D.shopping=[];
  // Migrate old flat-items format to new cards format
  if(D.shopping.length>0&&D.shopping[0].text!==undefined){D.shopping=[{id:Date.now(),name:"Shopping",items:D.shopping}];}
  D.shopping.forEach(c=>{if(!c.items)c.items=[];});
  if(!D.eventCategories)D.eventCategories=[...DEFAULT_EVT_CATS];
  if(!D.investments)D.investments=[];
  D.goals.forEach(g=>{if(!g.tasks)g.tasks=[];if(g.plan===undefined)g.plan="";});
}

// ── Sync ──
function setSS(msg){const el=document.getElementById("sync-status");el.textContent=msg;el.className=msg.includes("✓")?"status-ok":msg.includes("rror")||msg.includes("fail")||msg.includes("Not")?"status-err":"status-mid";}
async function loadRemote(){
  if(!workerUrl)return;setSS("Loading…");
  try{
    const headers={};
    if(workerToken)headers["Authorization"]="Bearer "+workerToken;
    const r=await fetch(workerUrl,{headers});
    if(r.status===401){setSS("Auth failed ✕");addBubble("ai","401: check your auth token (🔒 Token).");return;}
    if(!r.ok)throw new Error("HTTP "+r.status);
    const d=await r.json();
    if(d&&Object.keys(d).length>0)D=d;
    safeD();setSS("Synced ✓");render();addBubble("ai","Connected! Data loaded.");
  }catch(e){setSS("Error: "+e.message);}
}
async function saveRemote(){
  if(!workerUrl){setSS("Not connected");return;}setSS("Saving…");
  try{
    const headers={"Content-Type":"application/json"};
    if(workerToken)headers["Authorization"]="Bearer "+workerToken;
    const r=await fetch(workerUrl,{method:"POST",headers,body:JSON.stringify(D)});
    if(r.status===401){setSS("Auth failed ✕");return;}
    if(!r.ok)throw new Error("HTTP "+r.status);
    setSS("Saved ✓");
  }catch(e){setSS("Save failed");}
}
function toggleBar(id){document.getElementById(id).classList.toggle("open");}
async function connectWorker(){
  const u=document.getElementById("url-field").value.trim();if(!u)return;
  workerUrl=u;localStorage.setItem(WKEY,u);
  document.getElementById("url-bar").classList.remove("open");
  await loadRemote();
}
function saveKey(){
  const k=document.getElementById("key-field").value.trim();if(!k)return;
  localStorage.setItem(GKEY,k);document.getElementById("key-bar").classList.remove("open");
  addBubble("ai","Gemini key saved! I'm ready.");
}
function saveToken(){
  const t=document.getElementById("token-field").value.trim();if(!t)return;
  workerToken=t;localStorage.setItem(TKEY,t);document.getElementById("token-bar").classList.remove("open");
  addBubble("ai","Auth token saved! Reconnecting…");loadRemote();
}

// ── Navigation ──
function nav(sec,btn){section=sec;document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();}

// ── Render router ──
function render(){
  const main=document.getElementById("main");
  if(section==="calendar"){renderCal(main);return;}
  if(section==="finance"){renderFin(main);return;}
  if(section==="shopping"){renderShopping(main);return;}
  if(section==="investment"){renderInvestment(main);return;}
  if(section==="workspace"){renderWorkspace(main);return;}
  if(section==="goals"){renderGoals(main);return;}
}

// ── Goals ──
function renderGoals(main){
  const goals=D.goals||[];
  if(activeGoal>=goals.length)activeGoal=Math.max(0,goals.length-1);

  let h=`<div style="display:flex;gap:8px;margin-bottom:12px">
    <input id="new-goal-input" type="text" placeholder="New goal…" onkeydown="if(event.key==='Enter')addGoal()"/>
    <button class="pbtn" onclick="addGoal()">Add</button>
  </div>`;

  if(!goals.length){h+=`<p class="empty">No goals yet.</p>`;main.innerHTML=h;return;}

  // Tab bar
  h+=`<div style="display:flex;gap:4px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px">`;
  goals.forEach((g,i)=>{
    const tasks=g.tasks||[];
    const pct=tasks.length?Math.round(tasks.filter(t=>t.done).length/tasks.length*100):0;
    const active=activeGoal===i;
    h+=`<button onclick="activeGoal=${i};render()" style="padding:6px 14px;border-radius:20px;border:none;font-size:13px;cursor:pointer;white-space:nowrap;flex-shrink:0;background:${active?"#C9A227":"#0F1E35"};color:${active?"#fff":"#888"};font-weight:${active?"600":"400"}">${esc(g.text)} <span style="opacity:.75">${pct}%</span></button>`;
  });
  h+=`</div>`;

  const gi=activeGoal;
  const g=goals[gi];
  const tasks=g.tasks||[];
  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;

  h+=`<div class="card">`;

  // Title + delete
  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
    <span style="font-weight:600;font-size:16px;flex:1;line-height:1.3">${esc(g.text)}</span>
    <button class="del-btn" onclick="delGoal(${gi})" style="margin-left:8px;flex-shrink:0">✕</button>
  </div>`;

  // Progress bar
  h+=`<div style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:11px;color:#888;letter-spacing:.04em;text-transform:uppercase">Progress</span>
      <span style="font-size:13px;font-weight:600;color:#C9A227">${pct}%</span>
    </div>
    <div style="background:#1C2E4A;border-radius:4px;height:8px">
      <div style="background:#C9A227;height:8px;border-radius:4px;width:${pct}%;transition:width .3s ease"></div>
    </div>
    ${tasks.length?`<div style="font-size:11px;color:#888;margin-top:5px">${done} of ${tasks.length} tasks completed</div>`:`<div style="font-size:11px;color:#555;margin-top:5px">Add tasks to track progress</div>`}
  </div>`;

  // Plan
  h+=`<div style="margin-bottom:16px">
    <div style="font-size:11px;color:#888;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px">Plan</div>
    <textarea id="goal-plan" placeholder="Describe your approach, milestones, key steps…" style="min-height:90px" onblur="saveGoalPlan(${gi})">${esc(g.plan||"")}</textarea>
  </div>`;

  // Tasks
  h+=`<div style="font-size:11px;color:#888;letter-spacing:.04em;text-transform:uppercase;margin-bottom:10px">Tasks</div>`;
  if(tasks.length){
    tasks.forEach((t,ti)=>{
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1C2E4A">
        <div onclick="toggleGoalTask(${gi},${ti})" style="width:16px;height:16px;border-radius:50%;border:2px solid ${t.done?"#3d9e75":"#1C2E4A"};background:${t.done?"#3d9e75":"transparent"};cursor:pointer;flex-shrink:0"></div>
        <span style="flex:1;font-size:14px;${t.done?"text-decoration:line-through;color:#555":""}">${esc(t.text)}</span>
        <button class="del-btn" onclick="delGoalTask(${gi},${ti})">✕</button>
      </div>`;
    });
  }else{
    h+=`<p style="font-size:13px;color:#555;margin-bottom:4px">No tasks yet.</p>`;
  }
  h+=`<div style="display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid #1C2E4A">
    <input id="goal-task-input" type="text" placeholder="Add task…" onkeydown="if(event.key==='Enter')addGoalTask(${gi})"/>
    <button class="sbtn" onclick="addGoalTask(${gi})">Add</button>
  </div></div>`;

  main.innerHTML=h;
}
function addGoal(){
  const el=document.getElementById("new-goal-input");const t=el.value.trim();if(!t)return;
  D.goals.push({id:Date.now(),text:t,plan:"",tasks:[]});
  activeGoal=D.goals.length-1;el.value="";saveRemote();render();
}
function delGoal(gi){
  D.goals.splice(gi,1);
  if(activeGoal>=D.goals.length)activeGoal=Math.max(0,D.goals.length-1);
  saveRemote();render();
}
function addGoalTask(gi){
  const el=document.getElementById("goal-task-input");const t=el.value.trim();if(!t)return;
  if(!D.goals[gi].tasks)D.goals[gi].tasks=[];
  D.goals[gi].tasks.push({id:Date.now(),text:t,done:false});
  saveRemote();render();
}
function toggleGoalTask(gi,ti){D.goals[gi].tasks[ti].done=!D.goals[gi].tasks[ti].done;saveRemote();render();}
function delGoalTask(gi,ti){D.goals[gi].tasks.splice(ti,1);saveRemote();render();}

// ── Lock screen ──
async function unlockApp(){
  const urlVal=document.getElementById("lock-url").value.trim();
  const tokVal=document.getElementById("lock-token").value.trim();
  const errEl=document.getElementById("lock-err");
  const btn=document.getElementById("lock-btn");
  if(!urlVal||!tokVal){errEl.textContent="Both fields are required.";return;}
  btn.disabled=true;btn.textContent="Checking…";errEl.textContent="";
  try{
    const r=await fetch(urlVal,{headers:{"Authorization":"Bearer "+tokVal}});
    if(r.status===401){errEl.textContent="Wrong token — access denied.";btn.disabled=false;btn.textContent="Unlock";return;}
    if(!r.ok&&r.status!==404){errEl.textContent="Connection error (HTTP "+r.status+").";btn.disabled=false;btn.textContent="Unlock";return;}
    workerUrl=urlVal;workerToken=tokVal;
    localStorage.setItem(WKEY,urlVal);localStorage.setItem(TKEY,tokVal);
    document.getElementById("url-field").value=urlVal;
    document.getElementById("token-field").value=tokVal;
    document.getElementById("lock-screen").classList.add("hidden");
    await loadRemote();
  }catch(e){errEl.textContent="Network error — check the URL.";btn.disabled=false;btn.textContent="Unlock";}
}

function dStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function fmtTime(t){
  if(!t||!t.includes(":"))return "";
  const[h,m]=t.split(":");
  if(h===undefined||m===undefined)return "";
  const ap=+h>=12?"pm":"am";

const RECUR_OPTS=[
  {v:"none",   l:"Does not repeat"},
  {v:"daily",  l:"Daily"},
  {v:"workdays",l:"Every workday (Mon–Fri)"},
  {v:"weekly", l:"Weekly"},

];
function recurSelect(selected="none",id="erec"){

// ── Recurrence logic ──
function isRecurringOn(e,ds){
  if(!e.recurring||e.recurring==="none")return false;
  if(ds<e.date)return false;
  if(e.exceptions&&e.exceptions.includes(ds))return false;
  const start=new Date(e.date+"T12:00:00");
  const target=new Date(ds+"T12:00:00");
  const dow=target.getDay();
  switch(e.recurring){
    case"daily":return true;
    case"workdays":return dow>=1&&dow<=5;
    case"weekly":return dow===start.getDay();
    case"biweekly":{
      if(dow!==start.getDay())return false;
      const diff=Math.round((target-start)/86400000);
      return diff%14===0;
    }
    case"monthly":return start.getDate()===target.getDate();
    default:return false;
  }
}
function eventsForDate(ds){
  const result=[];
  D.events.forEach(e=>{
    if(e.date===ds){result.push(e);}
    else if(e.recurring&&e.recurring!=="none"&&isRecurringOn(e,ds)){result.push(e);}
  });
  return result.sort((a,b)=>(a.time||"").localeCompare(b.time||""));
}

// ── Finance v2 ──

function finMigrate(){
  const f=D.finance;
  if(!f.bull)f.bull=[];
  if(f.salary>0&&!f._incMigrated){
    f.incomeSources.push({id:"inc"+Date.now(),name:"Salary",amount:f.salary,frequency:"monthly"});
    f._incMigrated=true;
  }
  if(f.transactions&&f.transactions.length&&!f._txMigrated){
    const recMap={monthly:"monthly",bimonthly:"quarterly",quarterly:"quarterly",biannual:"biannual",yearly:"yearly"};
    f.transactions.forEach(tx=>{
      if(tx.type!=="expense")return;
      f.expenses.push({id:"exp"+Date.now()+Math.random(),category:tx.category||"Other",amount:tx.amount,description:tx.description||"",withdrawDay:parseInt((tx.date||"").split("-")[2])||null,recurring:recMap[tx.recurring]||"one-time",startDate:tx.date||todayStr});
    });
    f._txMigrated=true;
  }
}

// ── Calculations ──
function toMonthly(amount,freq){
  if(freq==="daily")return amount*365/12;
  if(freq==="weekly")return amount*52/12;
  if(freq==="yearly")return amount/12;
  return amount;
}
function totalMonthlyIncome(){
  return(D.finance.incomeSources||[]).reduce((s,src)=>s+toMonthly(src.amount,src.frequency),0);
}
function expInMonth(exp,y,m){
  if(exp.recurring==="one-time"){
    const ms=`${y}-${String(m+1).padStart(2,"0")}`;
    return(exp.startDate||"").startsWith(ms);
  }
  if(exp.recurring==="monthly")return true;
  if(!exp.startDate)return false;
  const sd=new Date(exp.startDate);
  const diff=(y*12+m)-(sd.getFullYear()*12+sd.getMonth());
  if(diff<0)return false;
  return diff%({quarterly:3,biannual:6,yearly:12}[exp.recurring]||1)===0;
}
function bullForMonth(y,m){
  const ms=`${y}-${String(m+1).padStart(2,"0")}`;
  return(D.finance.bull||[]).filter(b=>b.date.startsWith(ms)).reduce((s,b)=>s+b.amount,0);
}
function mSumm(y,m){
  const inc=totalMonthlyIncome()+bullForMonth(y,m);
  const exps=(D.finance.expenses||[]).filter(e=>expInMonth(e,y,m));
  const exp=exps.reduce((s,e)=>s+e.amount,0);
  return{inc,exp,bal:inc-exp,exps};
}

// ── Router ──
function renderFin(main){
  finMigrate();
  const tabs=["overview","month","income","expenses","bull"];
  const tl={overview:"Overview",month:"Month",income:"Income",expenses:"Expenses",bull:"Bull"};
  let h=`<div class="fin-tabs">${tabs.map(t=>`<button class="fin-tab${finTab===t?" active":""}" onclick="finTab='${t}';render()">${tl[t]}</button>`).join("")}</div>`;
  if(finTab==="overview")h+=finOverview();
  else if(finTab==="month")h+=finMonth();
  else if(finTab==="income")h+=finIncome();
  else if(finTab==="expenses")h+=finExpenses();
  else if(finTab==="bull")h+=finBull();
  main.innerHTML=h;
}

  const cur=mSumm(now.getFullYear(),now.getMonth());
  const ti=months.reduce((s,x)=>s+x.s.inc,0);
  const te=months.reduce((s,x)=>s+x.s.exp,0);
  const savingsRate=ti>0?Math.round(((ti-te)/ti)*100):0;

  const bars=months.map(x=>{

    <div class="sc"><div class="sl">Monthly income</div><div class="sv" style="color:#3d9e75">${fmt(cur.inc)}</div></div>
    <div class="sc"><div class="sl">Monthly expenses</div><div class="sv" style="color:#d85a30">${fmt(cur.exp)}</div></div>
  </div>
  <div class="sg2" style="margin-bottom:14px">
    <div class="sc"><div class="sl">Balance / mo</div><div class="sv" style="color:${cur.bal>=0?"#3d9e75":"#d85a30"}">${fmt(cur.bal)}</div></div>

// ── Bull tab ──
function finBull(){
  const bull=D.finance.bull||[];

  // Week bounds (Mon–Sun)
  const dow=now.getDay()===0?6:now.getDay()-1; // 0=Mon
  const weekStart=new Date(now);weekStart.setDate(now.getDate()-dow);weekStart.setHours(0,0,0,0);
  const weekEnd=new Date(weekStart);weekEnd.setDate(weekStart.getDate()+7);
  const weekTotal=bull.filter(b=>{const d=new Date(b.date+"T12:00:00");return d>=weekStart&&d<weekEnd;}).reduce((s,b)=>s+b.amount,0);

  const thisMonthMs=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const monthTotal=bull.filter(b=>b.date.startsWith(thisMonthMs)).reduce((s,b)=>s+b.amount,0);
  const yearTotal=bull.filter(b=>b.date.startsWith(String(now.getFullYear()))).reduce((s,b)=>s+b.amount,0);

  // 12-month chart
  const months=[];
  for(let i=11;i>=0;i--){
    let m=now.getMonth()-i,y=now.getFullYear();if(m<0){m+=12;y--;}
    const ms=`${y}-${String(m+1).padStart(2,"0")}`;
    const total=bull.filter(b=>b.date.startsWith(ms)).reduce((s,b)=>s+b.amount,0);
    const count=bull.filter(b=>b.date.startsWith(ms)).length;
    months.push({label:MONTHS_S[m],total,count,isCur:y===now.getFullYear()&&m===now.getMonth()});
  }
  const mx=Math.max(...months.map(x=>x.total),1);
  const bars=months.map(x=>{
    const h=Math.max(Math.round((x.total/mx)*80),x.total>0?2:0);
    return `<div style="display:flex;flex-direction:column;align-items:center;gap:2px;flex:1">
      <div style="display:flex;align-items:flex-end;height:80px">
        <div style="width:16px;height:${h}px;background:#3d9e75;border-radius:2px 2px 0 0" title="${fmt(x.total)}"></div>
      </div>
      <span style="font-size:9px;color:${x.isCur?"#C9A227":"#888"}">${x.label}</span>
    </div>`;
  }).join("");

  // Monthly average (months with at least 1 entry)
  const activeMos=months.filter(x=>x.total>0);
  const avgMonth=activeMos.length?activeMos.reduce((s,x)=>s+x.total,0)/activeMos.length:0;

  // Log sorted desc
  const rows=[...bull].sort((a,b)=>b.date.localeCompare(a.date)).map(b=>`<div style="display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #1C2E4A;gap:8px">
    <span style="flex:1;font-size:13px;color:#888">${b.date}</span>
    <span style="font-size:14px;font-weight:600;color:#3d9e75">+${fmt(b.amount)}</span>
    <button class="del-btn" onclick="delBull('${b.id}')">✕</button>
  </div>`).join("");

  return `
  <div class="sg3" style="margin-bottom:10px">
    <div class="sc"><div class="sl">This week</div><div class="sv" style="color:#3d9e75">${fmt(weekTotal)}</div></div>
    <div class="sc"><div class="sl">This month</div><div class="sv" style="color:#3d9e75">${fmt(monthTotal)}</div></div>
    <div class="sc"><div class="sl">This year</div><div class="sv" style="color:#3d9e75">${fmt(yearTotal)}</div></div>
  </div>
  <div class="sg2" style="margin-bottom:14px">
    <div class="sc"><div class="sl">Avg / active month</div><div class="sv" style="color:#3d9e75">${fmt(avgMonth)}</div></div>
    <div class="sc"><div class="sl">Total entries</div><div class="sv">${bull.length}</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:500;margin-bottom:12px">Log entry</div>
    <div style="display:flex;gap:8px">
      <input id="bull-date" type="date" value="${todayStr}" style="flex:1;width:auto"/>
      <input id="bull-amt" type="number" min="0" step="0.01" placeholder="Amount €" style="flex:1;width:auto"/>
      <button class="sbtn" onclick="addBull()">Add</button>
    </div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-size:13px;font-weight:500;margin-bottom:12px">12-month chart</div>
    <div style="display:flex;gap:2px;align-items:flex-end">${bars}</div>
  </div>
  <div class="card">
    <div style="font-size:13px;font-weight:500;margin-bottom:4px">Log</div>
    ${rows||"<p style='font-size:13px;color:#888;padding:8px 0'>No entries yet.</p>"}
  </div>`;
}

function buildCtx(){
  const cs=mSumm(now.getFullYear(),now.getMonth());
  return `You are a smart personal organizer and finance assistant. Today is ${todayStr}.
TASKS: ${D.tasks.map(t=>`[${t.done?"done":"pending"}] ${t.text}`).join("; ")||"none"}
NOTES: ${D.notes.map(n=>n.text).join("; ")||"none"}

SHOPPING: ${D.shopping.map(s=>`[${s.done?"bought":"needed"}] ${s.text}`).join("; ")||"none"}
FINANCE: salary=${fmt(D.finance.salary||0)}, this month income=${fmt(cs.inc)}, expenses=${fmt(cs.exp)}, balance=${fmt(cs.bal)}
TRANSACTIONS: ${D.finance.transactions.slice(0,10).map(t=>`[${t.type}] ${t.description} ${fmt(t.amount)} ${t.date} ${t.recurring!=="none"?"↻":""}`).join("; ")||"none"}
Finance actions (end of response):
ACTION_TX:{expense|income}:{amount}:{description}:{category}:{YYYY-MM-DD}:{none|monthly|bimonthly}
ACTION_SALARY:{amount}
ACTION_DEL_TX:{description fragment}
Actions (end of response): ACTION_ADD:{section}:{text}, ACTION_EVENT:{YYYY-MM-DD}:{HH:MM}:{title}:{category}, ACTION_DONE:{section}:{fragment}. Event categories: Work, Personal, Health, Social, Travel, Other. Be concise.`;
}

function parseActs(text){
  const lines=text.split("\n"),clean=[];
  lines.forEach(l=>{
    const a=l.match(/^ACTION_ADD:(\w+):(.+)$/);
    const dn=l.match(/^ACTION_DONE:(\w+):(.+)$/);
    const ev=l.match(/^ACTION_EVENT:([^:]+):([^:]*):([^:]+):?(.*)$/);
    const tx=l.match(/^ACTION_TX:(expense|income):([0-9.]+):([^:]+):([^:]+):([^:]+):([^:]+)$/);
    const sal=l.match(/^ACTION_SALARY:([0-9.]+)$/);
    const dtx=l.match(/^ACTION_DEL_TX:(.+)$/);
    if(a&&D[a[1]]){D[a[1]].push({id:Date.now(),text:a[2].trim(),done:false});}
    else if(dn&&D[dn[1]]){D[dn[1]]=D[dn[1]].map(i=>i.text.toLowerCase().includes(dn[2].toLowerCase())?{...i,done:true}:i);}
    else if(ev){const validCat=EVT_CATS.find(c=>c.name===(ev[4]||"").trim());D.events.push({id:Date.now(),date:ev[1].trim(),time:ev[2].trim(),title:ev[3].trim(),category:validCat?validCat.name:"Other"});D.events.sort((a,b)=>a.date.localeCompare(b.date));}
    else if(tx){D.finance.transactions.push({id:"tx"+Date.now(),type:tx[1],amount:parseFloat(tx[2]),description:tx[3].trim(),category:tx[4].trim(),date:tx[5].trim(),recurring:tx[6].trim()});D.finance.transactions.sort((a,b)=>b.date.localeCompare(a.date));}
    else if(sal){D.finance.salary=parseFloat(sal[1]);}
    else if(dtx){D.finance.transactions=D.finance.transactions.filter(t=>!t.description.toLowerCase().includes(dtx[1].toLowerCase()));}
    else clean.push(l);
  });
  return clean.join("\n").trim();
}

    const json=await res.json();
    if(json.error){th.remove();addBubble("ai","Gemini error: "+json.error.message);aiLoading=false;document.getElementById("send-btn").disabled=false;return;}
    const raw=json.candidates?.[0]?.content?.parts?.[0]?.text||"Sorry, couldn't respond.";
    const clean=parseActs(raw);
    th.remove();addBubble("ai",clean);chatHist.push({role:"assistant",content:clean});
    saveRemote();render();
  }catch(e){th.remove();addBubble("ai","Error: "+e.message);}
  aiLoading=false;document.getElementById("send-btn").disabled=false;
}


// ═══ INVESTMENT ═══
// ── Investment ──
let invForm={name:"",initial:"",monthlyRev:"",monthlyCost:"",growth:""};
let invResult=null;

function renderInvestment(main){
  const f=invForm;
  let h=`
  <div class="card" style="margin-bottom:12px">
    <div style="font-size:15px;font-weight:700;margin-bottom:14px">📈 Investment Analyzer</div>

    <div class="inv-label">Investment Name</div>
    <input id="inv-name" type="text" placeholder="e.g. Apartment, Business, Fund" value="${esc(f.name)}" style="margin-bottom:10px"/>

    <div class="inv-label">Initial Investment (€)</div>
    <input id="inv-initial" type="number" min="0" step="1" placeholder="50000" value="${f.initial}" style="margin-bottom:10px"/>

    <div class="sg2" style="margin-bottom:10px">
      <div>
        <div class="inv-label">Monthly Revenue (€)</div>
        <input id="inv-rev" type="number" min="0" step="1" placeholder="8000" value="${f.monthlyRev}"/>
      </div>
      <div>
        <div class="inv-label">Monthly Costs (€)</div>
        <input id="inv-cost" type="number" min="0" step="1" placeholder="5000" value="${f.monthlyCost}"/>
      </div>
    </div>

    <div class="inv-label">Expected Annual Growth Rate (%)</div>
    <input id="inv-growth" type="number" min="-100" max="1000" step="0.5" placeholder="10" value="${f.growth}" style="margin-bottom:14px"/>

    <button class="pbtn" onclick="calcInvestment()" style="width:100%">Calculate</button>
  </div>

  <div class="card" style="margin-bottom:12px;padding:12px 14px">
    <div style="font-size:11px;font-weight:600;color:#888;margin-bottom:8px;letter-spacing:.04em">WHAT MAKES A GOOD INVESTMENT?</div>
    <div style="font-size:12px;color:#aaa;line-height:1.7">
      <b style="color:#e8e8e8">ROI (Return on Investment)</b> — annual net profit ÷ initial capital × 100.<br>
      <b style="color:#e8e8e8">Payback period</b> — months until cumulative profit covers your investment.<br>
      <b style="color:#e8e8e8">Cash flow</b> — monthly revenue minus monthly costs. Must be positive.<br>
      <b style="color:#e8e8e8">Growth rate</b> — expected annual increase in profits (use conservative estimates).
    </div>
    <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:11px">
      ${[["⭐⭐⭐⭐⭐ Excellent","ROI > 50%","#3d9e75"],["⭐⭐⭐⭐ Great","ROI 30–50%","#5CB85C"],["⭐⭐⭐ Good","ROI 15–30%","#C9A227"],["⭐⭐ Fair","ROI 5–15%","#E08A3C"],["⭐ Poor","ROI 0–5%","#d85a30"],["💸 Loss","Negative ROI","#E05C5C"]].map(([s,r,c])=>`<div style="display:flex;align-items:center;gap:5px;padding:3px 0"><span>${s}</span><span style="color:${c};margin-left:auto">${r}</span></div>`).join("")}
    </div>
  </div>`;

  if(invResult) h+=renderInvResults(invResult);

  const saved=D.investments||[];
  if(saved.length){
    h+=`<div style="font-size:11px;color:#888;margin:16px 0 8px;letter-spacing:.04em;text-transform:uppercase">Saved Analyses</div>`;
    saved.forEach((inv,i)=>{h+=savedInvCard(inv,i);});
  }
  main.innerHTML=h;
}

function calcInvestment(){
  const name=document.getElementById("inv-name")?.value.trim()||"My Investment";
  const initial=parseFloat(document.getElementById("inv-initial")?.value)||0;
  const monthlyRev=parseFloat(document.getElementById("inv-rev")?.value)||0;
  const monthlyCost=parseFloat(document.getElementById("inv-cost")?.value)||0;
  const growth=parseFloat(document.getElementById("inv-growth")?.value)||0;
  invForm={name,initial,monthlyRev,monthlyCost,growth};

  const monthlyProfit=monthlyRev-monthlyCost;
  const annualProfit=monthlyProfit*12;
  const annualROI=initial>0?(annualProfit/initial*100):0;
  const paybackMonths=monthlyProfit>0?Math.ceil(initial/monthlyProfit):Infinity;

  // 3-year projection — profit grows by growth%, costs stay flat
  const years=[];
  let cumulative=0;
  let yearProfit=annualProfit;
  for(let y=1;y<=3;y++){
    cumulative+=yearProfit;
    years.push({year:y,profit:yearProfit,cumulative:cumulative});
    yearProfit*=(1+growth/100);
  }

  let score,scoreLabel,scoreColor;
  if(annualROI<0){score=0;scoreLabel="Loss — negative cash flow";scoreColor="#E05C5C";}
  else if(annualROI<5){score=1;scoreLabel="Poor";scoreColor="#d85a30";}
  else if(annualROI<15){score=2;scoreLabel="Fair";scoreColor="#E08A3C";}
  else if(annualROI<30){score=3;scoreLabel="Good";scoreColor="#C9A227";}
  else if(annualROI<50){score=4;scoreLabel="Great";scoreColor="#5CB85C";}
  else{score=5;scoreLabel="Excellent";scoreColor="#3d9e75";}

  invResult={name,initial,monthlyRev,monthlyCost,growth,monthlyProfit,annualProfit,annualROI,paybackMonths,years,score,scoreLabel,scoreColor};
  render();
}

function renderInvResults(r){
  const noBreakEven=r.paybackMonths===Infinity;
  const paybackStr=noBreakEven?"Never"
    :r.paybackMonths<=24?`${r.paybackMonths} months`
    :`${(r.paybackMonths/12).toFixed(1)} years`;

  // Which year does break-even occur in the projection?
  const bey=r.years.findIndex(y=>y.cumulative>=r.initial&&r.initial>0);

  // Score card
  const starsStr=r.score>0?"⭐".repeat(r.score):"💸";
  let h=`<div class="card" style="margin-bottom:12px;text-align:center;padding:24px 16px">
    <div style="font-size:40px;margin-bottom:6px">${starsStr}</div>
    <div style="font-size:22px;font-weight:700;color:${r.scoreColor};margin-bottom:6px">${r.scoreLabel}</div>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:8px">
      <div><div style="font-size:11px;color:#888">Annual ROI</div><div style="font-size:18px;font-weight:700;color:${r.scoreColor}">${r.annualROI.toFixed(1)}%</div></div>
      <div style="width:1px;background:#1C2E4A"></div>
      <div><div style="font-size:11px;color:#888">Payback</div><div style="font-size:18px;font-weight:700;color:${noBreakEven?"#E05C5C":r.scoreColor}">${paybackStr}</div></div>
    </div>
  </div>`;

  // Key metrics
  h+=`<div class="card" style="margin-bottom:12px">
    <div class="inv-label" style="margin-bottom:10px">Key Metrics</div>
    ${invMetricRow("Monthly cash flow",fmt(r.monthlyProfit),r.monthlyProfit>=0?"#3d9e75":"#E05C5C")}
    ${invMetricRow("Annual net profit",fmt(r.annualProfit),r.annualProfit>=0?"#3d9e75":"#E05C5C")}
    ${invMetricRow("Break-even point",paybackStr,noBreakEven?"#E05C5C":r.paybackMonths<24?"#3d9e75":r.paybackMonths<60?"#C9A227":"#E08A3C")}
    ${invMetricRow("Initial investment",fmt(r.initial),"#e8e8e8")}
    ${invMetricRow("Monthly revenue",fmt(r.monthlyRev),"#888")}
    ${invMetricRow("Monthly costs",fmt(r.monthlyCost),"#888")}
  </div>`;

  // 3-year projection
  h+=`<div class="card" style="margin-bottom:12px">
    <div class="inv-label" style="margin-bottom:12px">3-Year Projection${r.growth!==0?` (${r.growth>0?"+":""}${r.growth}% growth/yr)`:""}</div>`;

  r.years.forEach(y=>{
    const pct=r.initial>0?Math.min(100,Math.max(0,y.cumulative/r.initial*100)):y.cumulative>0?100:0;
    const reached=r.initial>0&&y.cumulative>=r.initial;
    const isBreakEvenYear=bey===y.year-1;
    const barColor=reached?"#3d9e75":y.cumulative>0?"#C9A227":"#E05C5C";
    h+=`<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
        <span style="font-size:13px;font-weight:600">Year ${y.year}</span>
        <span style="font-size:12px;color:#888">+${fmt(y.profit)} this year</span>
        <span style="font-size:14px;font-weight:700;color:${barColor}">${fmt(y.cumulative)}</span>
      </div>
      <div style="background:#0C1525;border-radius:4px;height:8px;overflow:hidden">
        <div style="background:${barColor};height:8px;border-radius:4px;width:${pct}%"></div>
      </div>
      ${isBreakEvenYear?`<div style="font-size:11px;color:#3d9e75;margin-top:4px">✓ Break-even reached in Year ${y.year}</div>`:""}
      ${!isBreakEvenYear&&!reached&&r.initial>0?`<div style="font-size:10px;color:#555;margin-top:3px">${fmt(Math.max(0,r.initial-y.cumulative))} still to recover</div>`:""}
    </div>`;
  });

  h+=`<div style="border-top:1px solid #1C2E4A;padding-top:10px;margin-top:4px">
    <div style="font-size:12px;color:#888">Cumulative profit after 3 years</div>
    <div style="font-size:20px;font-weight:700;color:${r.years[2].cumulative>=0?"#3d9e75":"#E05C5C"}">${fmt(r.years[2].cumulative)}</div>
    ${r.initial>0?`<div style="font-size:12px;color:#888;margin-top:2px">Total ROI over 3 years: <span style="color:#e8e8e8;font-weight:600">${(r.years[2].cumulative/r.initial*100).toFixed(1)}%</span></div>`:""}
  </div>`;

  h+=`<button class="sbtn" onclick="saveInvestment()" style="width:100%;margin-top:14px">Save Analysis</button>
  </div>`;

  return h;
}

function invMetricRow(label,value,color){
  return `<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #0C1525">
    <span style="font-size:13px;color:#888">${label}</span>
    <span style="font-size:14px;font-weight:600;color:${color}">${value}</span>
  </div>`;
}

function saveInvestment(){
  if(!invResult)return;
  if(!D.investments)D.investments=[];
  D.investments.push({...invResult,id:Date.now(),date:todayStr});
  invResult=null;
  invForm={name:"",initial:"",monthlyRev:"",monthlyCost:"",growth:""};
  saveRemote();render();
}

function savedInvCard(inv,i){
  const stars=inv.score>0?"⭐".repeat(inv.score):"💸";
  return `<div class="card" style="margin-bottom:10px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">${esc(inv.name)}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${inv.date} · ${fmt(inv.initial)} invested</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px">${stars}</div>
        <div style="font-size:14px;font-weight:700;color:${inv.scoreColor}">${inv.annualROI.toFixed(1)}%</div>
      </div>
      <button class="del-btn" onclick="delInvestment(${i})">✕</button>
    </div>
    <div style="display:flex;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid #0C1525;font-size:12px;color:#888">
      <span>Cash flow <span style="color:${inv.monthlyProfit>=0?"#3d9e75":"#E05C5C"};font-weight:600">${fmt(inv.monthlyProfit)}/mo</span></span>
      <span>Payback <span style="color:#e8e8e8;font-weight:600">${inv.paybackMonths===Infinity?"Never":inv.paybackMonths<=24?inv.paybackMonths+"mo":(inv.paybackMonths/12).toFixed(1)+"yr"}</span></span>
      <span>3yr <span style="color:#e8e8e8;font-weight:600">${fmt(inv.years[2].cumulative)}</span></span>
    </div>
  </div>`;
}

function delInvestment(i){D.investments.splice(i,1);saveRemote();render();}

</script>
