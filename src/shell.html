<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>My Organizer</title>
<style>
{{STYLE}}
</style>
</head>
<body>

<div id="header">
  <h1>My Organizer</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <span id="sync-status" class="status-err" style="font-size:11px;">Not connected</span>
    <button class="hbtn" onclick="toggleBar('url-bar')">⚙ URL</button>
    <button class="hbtn" onclick="toggleBar('key-bar')">🔑 Key</button>
  </div>
</div>
<div id="url-bar" class="bar">
  <input id="url-field" type="url" placeholder="https://your-function.run.app"/>
  <button class="sbtn" onclick="connectWorker()">Connect</button>
</div>
<div id="key-bar" class="bar">
  <input id="key-field" type="password" placeholder="Gemini API key (AIza...)"/>
  <button class="sbtn" onclick="saveKey()">Save</button>
</div>

<div id="nav">
  <button class="nav-btn active" onclick="nav('calendar',this)">▦ Calendar</button>
  <button class="nav-btn" onclick="nav('tasks',this)">✓ Tasks</button>
  <button class="nav-btn" onclick="nav('notes',this)">≡ Notes</button>
  <button class="nav-btn" onclick="nav('goals',this)">◎ Goals</button>
  <button class="nav-btn" onclick="nav('shopping',this)">⊕ Shopping</button>
  <button class="nav-btn" onclick="nav('finance',this)">€ Finance</button>
  <button class="nav-btn" onclick="nav('review',this)">★ Review</button>
</div>

<div id="main"></div>

<div id="chat-wrap">
  <div id="chat-inner">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
      <span style="font-size:12px;color:#888">AI Assistant</span>
      <button onclick="clearChat()" style="font-size:11px;color:#888;background:transparent;border:1px solid #1C2E4A;border-radius:6px;padding:3px 8px;cursor:pointer">Clear</button>
    </div>
    <div id="chat-messages">
      <div class="bubble ai">Hi Alejandro! Use ⚙ URL to sync with Google Cloud, and 🔑 Key for Gemini AI.</div>
    </div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder='Ask AI — "What should I focus on today?"' onkeydown="if(event.key==='Enter')sendMsg()"/>
      <button id="send-btn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<script>
{{SCRIPT}}
</script>
</body>
</html>
